<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="dynamic(main)">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Quản Lý Sản Phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
    .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.1); }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,.05); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <!-- ✅ FIX: Dùng th:href thay vì href thuần -->
    <a class="navbar-brand fw-bold" th:href="@{/products}">🚀 TechStore</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" th:href="@{/products}">Danh sách</a>
      <!-- ✅ FIX: Nút Thêm sản phẩm kết nối đúng với /products/create -->
      <a class="nav-link btn btn-primary btn-sm text-white ms-lg-3 px-3"
         th:href="@{/products/create}">+ Thêm sản phẩm</a>
    </div>
  </div>
</nav>

<main class="container">
  <div th:replace="${main}"></div>
</main>

<footer class="text-center py-4 text-muted">
  <small>&copy; 2026 Quản lý kho hàng</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
