<section th:replace="~{Product/layout :: dynamic(~{::content})}">
  <div th:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold text-dark">Danh sách sản phẩm</h2>
      <a th:href="@{/products/create}" class="btn btn-success fw-bold">
        + Thêm mới
      </a>
    </div>

    <!-- Nếu chưa có sản phẩm -->
    <div th:if="${#lists.isEmpty(items)}" class="text-center py-5 text-muted">
      <p class="fs-5">
        Chưa có sản phẩm nào.
        <a th:href="@{/products/create}">Thêm ngay</a>
      </p>
    </div>

    <!-- Nếu có sản phẩm -->
    <div class="card" th:unless="${#lists.isEmpty(items)}">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light">
          <tr>
            <th class="ps-4">Sản phẩm</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th class="text-center">Hành động</th>
          </tr>
          </thead>

          <tbody>
          <tr th:each="p : ${items}" class="align-middle">

            <!-- Tên + Ảnh -->
            <td class="ps-4">
              <div class="d-flex align-items-center">

                <img th:src="@{|/images/${p.image}|}"
                     class="rounded-3 me-3"
                     style="width:50px;height:50px;object-fit:cover;"
                     onerror="this.src='https://placehold.co/50x50?text=No+Img'">

                <span class="fw-semibold"
                      th:text="${p.name}">
                                    </span>
              </div>
            </td>

            <!-- Giá -->
            <td class="text-primary fw-bold"
                th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' đ'">
            </td>

            <!-- Danh mục (CÁCH AN TOÀN 100%) -->
            <td>
                                <span th:each="c : ${categories}">
                                    <span th:if="${c.id == p.categoryId}"
                                          class="badge bg-secondary text-white"
                                          th:text="${c.name}">
                                    </span>
                                </span>
            </td>

            <!-- Hành động -->
            <td class="text-center">
              <a th:href="@{|/products/edit/${p.id}|}"
                 class="btn btn-outline-warning btn-sm px-3">
                Sửa
              </a>
            </td>

          </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</section>
